<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Negado</title>

<style>
body {
    margin: 0;
    font-family: "Manrope", sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #143d79, #1f5aa5);
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    font-size: 60px;
    margin: 0;
}

h2 {
    margin-top: 10px;
    font-weight: 500;
}

p {
    margin: 20px 0;
    color: #e0e0e0;
}

.btn {
    display: inline-block;
    padding: 12px 25px;
    background: white;
    color: #143d79;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #f0f0f0;
    transform: scale(1.05);
}
</style>

</head>

<body>

<div class="container">
    <h1>403</h1>
    <h2>Acesso Negado</h2>

    <p>Você não tem permissão para acessar esta área do sistema.</p>

    <a href="/login" class="btn">Voltar para o login</a>
</div>

</body>
</html>
